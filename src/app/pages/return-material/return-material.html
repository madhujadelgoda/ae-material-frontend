<div class="card">

  <div class="card-header flex-between">
    <h3>Allocation Usage & Return</h3>
  </div>

  <table class="table table--compact">

    <thead>
      <tr>
        <th>Team</th>
        <th>Material</th>
        <th>Allocated</th>
        <th>Used</th>
        <th>Damaged</th>
        <th>Returned</th>
        <th width="160">Action</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let a of allocations">

        <td>{{ a.team_name }}</td>
        <td>{{ a.material_code }}</td>

        <td>{{ a.allocated_quantity }}</td>

        <!-- USED -->
        <td>
          <input
            class="qty-input"
            type="number"
            min="0"
            [max]="a.allocated_quantity"
            [(ngModel)]="usedQty[a.allocation_id]"
            [disabled]="isLocked(a) || !canReturn"
          />
        </td>

        <!-- DAMAGED -->
        <td>
          <input
            class="qty-input"
            type="number"
            min="0"
            [max]="a.allocated_quantity"
            [(ngModel)]="damagedQty[a.allocation_id]"
            [disabled]="isLocked(a) || !canReturn"
          />
        </td>

        <!-- RETURNED -->
        <td>
          <span
            class="badge"
            [ngClass]="isLocked(a) ? 'red' : 'green'">

            {{ returnedQty(a) === null
                ? '—'
                : returnedQty(a)
            }}

          </span>
        </td>

        <!-- ACTION -->
        <td>

          <button
            class="btn small primary"
            *hasPermission="'material.return'"
            (click)="submitUsageAndReturn(a)"
            [disabled]="
              loading ||
              isLocked(a) ||
              !canReturn ||
              (usedQty[a.allocation_id] || 0) <= 0
            ">

            {{ isLocked(a)
                ? 'Completed'
                : 'Confirm & Return'
            }}

          </button>

        </td>

      </tr>

    </tbody>

  </table>

</div>
