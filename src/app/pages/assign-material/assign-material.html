<div class="card">

  <!-- Header -->
  <div class="card-header flex-between">
    <h3>Assign Materials</h3>
  </div>

  <!-- Locator info -->
  <div *ngIf="locator" class="hint" style="margin-bottom: 14px;">
    <strong>Locator:</strong>
    {{ locator.locator_name }} ({{ locator.locator_id }})
  </div>

  <!-- Filters / Form Row -->
  <div class="filters-row">

    <!-- Team -->
    <div class="form-group inline">
      <label>Team</label>
      <select [(ngModel)]="selectedTeamId">
        <option [ngValue]="null">Select team</option>
        <option *ngFor="let t of teams" [value]="t.team_id">
          {{ t.team_name }}
        </option>
      </select>
    </div>

    <!-- Material -->
    <div class="form-group inline">
      <label>Material</label>
      <select [(ngModel)]="selectedMaterial">
        <option [ngValue]="null">Select material</option>

        <option
          *ngFor="let m of materials"
          [ngValue]="m"
          [disabled]="m.remaining_quantity <= 0"
        >
          {{ m.material_name }}
          ({{ m.remaining_quantity }} {{ m.uom }} available)
        </option>
      </select>
    </div>

    <!-- Quantity -->
    <div class="form-group inline">
      <label>Quantity</label>
      <input
        type="number"
        class="qty-input"
        [(ngModel)]="quantity"
        min="1"
        [max]="selectedMaterial?.remaining_quantity"
        placeholder="Qty"
      />
    </div>

    <!-- Action -->
    <div class="form-group inline" style="align-self: flex-end;">
      <button
        class="btn primary"
        (click)="submit()"
        [disabled]="loading"
      >
        {{ loading ? 'Assigning…' : 'Assign Material' }}
      </button>
    </div>

  </div>

  <!-- Info box -->
  <div
    *ngIf="selectedMaterial"
    class="badge green"
    style="margin-top: 16px; display: inline-block;"
  >
    Remaining:
    {{ selectedMaterial.remaining_quantity }}
    {{ selectedMaterial.uom }}
  </div>

</div>
