<div class="card">

  <div class="card-header flex-between">
    <h3>Assign Materials</h3>
  </div>

  <!-- Locator info -->
  <div *ngIf="locator" class="hint" style="margin-bottom: 14px;">
    <strong>Locator:</strong>
    {{ locator.locator_code }} ({{ locator.locator_id }})
  </div>

  <!-- Error / Success -->
  <div *ngIf="error" class="error">{{ error }}</div>
  <div *ngIf="success" class="success">{{ success }}</div>

  <div class="filters-row">

    <!-- Team -->
<div class="form-group inline wide">
  <label>Team</label>
  <ng-select
    [items]="teams"
    bindLabel="team_name"
    bindValue="team_id"
    placeholder="Search team..."
    [(ngModel)]="selectedTeamId"
    (change)="onTeamSelected()"
    [clearable]="true">
  </ng-select>
</div>

<!-- Material -->
<div class="form-group inline wide">
  <label>Material</label>
  <ng-select
    [items]="materials"
    bindLabel="material_name"
    placeholder="Search material..."
    [(ngModel)]="selectedMaterial"
    [disabled]="!selectedTeamId"
    [clearable]="true">

    <ng-template ng-option-tmp let-item="item">
      {{ item.material_name }}
      — {{ item.remaining_quantity }} {{ item.erp_uom }}
    </ng-template>

  </ng-select>

  <small *ngIf="!selectedTeamId" class="muted">
    Select a team first
  </small>
</div>


    <!-- Quantity -->
    <div class="form-group inline">
      <label>Quantity</label>
      <input
        type="number"
        [(ngModel)]="quantity"
        min="1"
        [max]="selectedMaterial?.remaining_quantity"
        [disabled]="!selectedMaterial"
        placeholder="Qty"
      />
    </div>

    <!-- Action -->
    <div class="form-group inline" style="align-self: flex-end;">
      <button
        class="btn primary"
        (click)="submit()"
        [disabled]="loading || !selectedTeamId">
        {{ loading ? 'Assigning…' : 'Assign Material' }}
      </button>
    </div>

  </div>

  <!-- Remaining -->
  <div *ngIf="selectedMaterial" class="badge green" style="margin-top: 16px;">
    Remaining: {{ selectedMaterial.remaining_quantity }} {{ selectedMaterial.erp_uom }}
  </div>

</div>
