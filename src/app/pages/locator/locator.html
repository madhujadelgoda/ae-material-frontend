<div class="card">

  <!-- Header -->
  <div class="card-header flex-between">
    <h3>Assigned Locator</h3>
  </div>

  <!-- Locator Info -->
  <div *ngIf="locator" class="filters-row">
    <div class="form-group inline">
      <label>ID</label>
      <div>{{ locator.locator_id }}</div>
    </div>

    <div class="form-group inline">
      <label>Name</label>
      <div>{{ locator.locator_name }}</div>
    </div>
  </div>

</div>

<div class="card" style="margin-top: 16px;">

  <!-- Header -->
  <div class="card-header flex-between">
    <h3>Materials Available in Locator</h3>
  </div>

  <!-- Table -->
  <table class="table table--compact">
    <thead>
      <tr>
        <th>Code</th>
        <th>Name</th>
        <th>UOM</th>
        <th>Total</th>
        <th>Allocated</th>
        <th>Available</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let m of materials">
        <td>{{ m.material_code }}</td>
        <td>{{ m.material_name }}</td>
        <td>{{ m.uom }}</td>
        <td>{{ m.total_quantity }}</td>
        <td>{{ m.allocated_quantity }}</td>
        <td>
          <span class="badge green">
            {{ m.remaining_quantity }}
          </span>
        </td>
      </tr>
    </tbody>
  </table>

</div>
