<!-- ============================
     LOCATOR MAIN CARD
============================ -->

<div class="card">

  <!-- HEADER -->
  <div class="card-header flex-between">

    <h3>Assigned Locator</h3>

    <!-- TOPBAR LINKS -->
    <div class="top-links">

      <!-- Inventory tab -->
      <a
        routerLink="./"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="tab-link"
      >
        My Locator
      </a>

      <!-- Team allocations tab -->
      <a
        routerLink="team-allocations"
        routerLinkActive="active"
        class="tab-link"
        *hasPermission="'material.view_team_allocations'"
      >
        Team Allocations
      </a>

    </div>

  </div>

  <!-- ASSIGNED LOCATOR DETAILS -->
  <div *ngIf="locator" class="filters-row">

    <div class="form-group inline">
      <label>Locator Code</label>
      <div>
        <strong>{{ locator.locator_code }}</strong>
      </div>

    </div>

  </div>

  <!-- LOADING -->
  <div *ngIf="!locator && !error" class="muted">
    Loading locator...
  </div>

  <!-- ERROR -->
  <div *ngIf="error" class="error">
    {{ error }}
  </div>

</div>

<!-- ============================
     CHILD ROUTES RENDER HERE
============================ -->

<router-outlet></router-outlet>
