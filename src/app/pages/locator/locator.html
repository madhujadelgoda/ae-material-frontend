<!-- Locator Card -->
<div class="card">

  <div class="card-header flex-between">
    <h3>Assigned Locator</h3>
  </div>

  <div *ngIf="locator" class="filters-row">
    <!-- <div class="form-group inline">
      <label>ID</label>
      <div>{{ locator.locator_id }}</div>
    </div> -->

    <div class="form-group inline">
      <label>Locator Code</label>
      <div>{{ locator.locator_code }}</div>
    </div>

    <!-- <div class="form-group inline">
      <label>Warehouse</label>
      <div>{{ locator.warehouse_id }}</div>
    </div> -->
  </div>

  <div *ngIf="!locator && !error" class="muted">
    Loading locator...
  </div>

  <div *ngIf="error" class="error">
    {{ error }}
  </div>

</div>

<!-- Materials Card -->
<div class="card" style="margin-top: 16px;">

  <div class="card-header flex-between">
    <h3>Materials in Locator</h3>
  </div>

  <div *ngIf="loading" class="muted">
    Loading materials...
  </div>

  <table *ngIf="!loading && materials.length" class="table table--compact">
    <thead>
      <tr>
        <th>ERP Code</th>
        <th>Name</th>
        <th>ERP UOM</th>
        <!-- <th>Total Quantity</th>
        <th>Allocated</th> -->
        <th>Available</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let m of materials">
        <td>{{ m.erp_code }}</td>
        <td>{{ m.material_name }}</td>
        <td>{{ m.erp_uom }}</td>
        <!-- <td>{{ m.total_quantity }}</td>
        <td>{{ m.allocated_quantity }}</td> -->
        <td>
          <span
            class="badge"
            [class.green]="m.remaining_quantity > 0"
            [class.red]="m.remaining_quantity === 0"
          >
            {{ m.remaining_quantity }}
          </span>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && !materials.length" class="muted">
    No materials found in this locator.
  </div>

</div>
