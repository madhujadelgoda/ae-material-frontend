<!-- ============================
     LOCATOR MAIN CARD
============================ -->

<div class="card locator-summary-card">

  <!-- HEADER -->
  <div class="card-header locator-summary-header">
    <div class="locator-summary-title-wrap">
      <div class="locator-summary-icon">
        <span class="material-symbols-rounded">location_on</span>
      </div>
      <div>
        <h3 class="locator-summary-title">Assigned Locator</h3>
      </div>
    </div>
  </div>

  <!-- ASSIGNED LOCATOR DETAILS -->
  <div *ngIf="locator" class="locator-summary-body">

    <div class="locator-info-item">
      <label>Locator Code</label>
      <div class="locator-code-chip">
        <span class="material-symbols-rounded">pin_drop</span>
        <strong>{{ locator.locator_code }}</strong>
      </div>
    </div>

  </div>

  <!-- LOADING -->
  <div *ngIf="!locator && !error" class="locator-state muted">
    <span class="material-symbols-rounded">progress_activity</span>
    <span>Loading locator...</span>
  </div>

  <!-- ERROR -->
  <div *ngIf="error" class="locator-state locator-state-error">
    <span class="material-symbols-rounded">error</span>
    <span>{{ error }}</span>
  </div>

</div>

<!-- ============================
     CHILD ROUTES RENDER HERE
============================ -->

<router-outlet></router-outlet>
