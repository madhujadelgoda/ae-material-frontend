<!-- Loading -->
<div *ngIf="loading" class="card">
  <p>Loading dashboard data…</p>
</div>

<!-- Error -->
<div *ngIf="error" class="card error">
  {{ error }}
</div>

<!-- Dashboard -->
<div *ngIf="!loading && !error" class="dashboard-grid">
  <div class="card stat-card" *ngFor="let card of statCards">
    <div class="card-stat-icon {{ card.color }}">
      <span class="material-symbols-rounded">{{ card.icon }}</span>
    </div>
    <h4>{{ card.label }}</h4>
    <p>{{ getStatValue(card.key) }}</p>
  </div>
</div>
