<div class="login-page">
  <div class="login-shell">

    <section class="login-visual" aria-hidden="true">
      <img
        src="https://images.unsplash.com/photo-1517191434949-5e90cd67d2b6?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        alt=""
        class="login-visual-image"
      />

      <div class="login-visual-overlay"></div>

      <div class="login-visual-brand">AE Material</div>

      <div class="login-visual-footer">
        <p>Product of Sri Lanka Telecom</p>
      </div>
    </section>

    <section class="login-form-panel">
      <form class="login-form" (ngSubmit)="login()">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to continue to AE Material</p>

        <div class="form-group">
          <label>Username</label>
          <input
            type="text"
            name="username"
            [(ngModel)]="username"
            placeholder="Enter your username"
            required
          />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="Enter your password"
            required
          />
        </div>

        <button class="btn-primary" type="submit">
          Log in
        </button>

        <p class="error" *ngIf="error">{{ error }}</p>
      </form>
    </section>

  </div>
</div>
