<!-- Create Role -->
<div class="card">

  <div class="card-header">
    <h3>Roles Management</h3>
  </div>

  <div class="form-group">
    <label>Role Name</label>
    <input
      type="text"
      placeholder="e.g. ADMIN"
      [(ngModel)]="roleName"
    />
  </div>

  <div class="form-group">
    <label>Description</label>
    <input
      type="text"
      placeholder="Short description"
      [(ngModel)]="description"
    />
  </div>

  <button class="btn primary" (click)="createRole()" [disabled]="loading">
    {{ loading ? 'Creating…' : 'Create Role' }}
  </button>

  <p class="error" *ngIf="error">{{ error }}</p>

</div>

<!-- Existing Roles -->
<div class="card" style="margin-top: 20px;">

  <div class="card-header flex-between">
    <h3>Existing Roles</h3>
    <span class="badge green">{{ roles.length }} Total</span>
  </div>

  <table class="table table--compact">
    <thead>
      <tr>
        <th style="width: 20%">Role</th>
        <th>Description</th>
        <th style="width: 15%">Users</th>
        <th style="width: 180px">Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let r of roles">
        <td><strong>{{ r.role_name }}</strong></td>

        <td>
          <span *ngIf="editingRole?.role_id !== r.role_id">
            {{ r.description || '—' }}
          </span>

          <input
            *ngIf="editingRole?.role_id === r.role_id"
            [(ngModel)]="editDescription"
          />
        </td>

        <td>
          <span class="badge">{{ r.user_count }}</span>
        </td>

        <td>
          <ng-container *ngIf="editingRole?.role_id !== r.role_id">
            <button class="btn small" (click)="startEdit(r)">Edit</button>
            <button class="btn danger small" (click)="deleteRole(r)">Delete</button>
          </ng-container>

          <ng-container *ngIf="editingRole?.role_id === r.role_id">
            <button class="btn small primary" (click)="saveEdit()">Save</button>
            <button class="btn small ghost" (click)="cancelEdit()">Cancel</button>
          </ng-container>
        </td>
      </tr>

      <tr *ngIf="roles.length === 0">
        <td colspan="4" style="text-align:center; color: var(--text-secondary)">
          No roles created yet
        </td>
      </tr>
    </tbody>
  </table>

</div>
