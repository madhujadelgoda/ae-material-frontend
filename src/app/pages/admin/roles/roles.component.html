<!-- =========================
     CREATE ROLE
========================= -->

<ng-container *hasPermission="'role.create'">

  <div class="card">

    <div class="card-header flex-between" style="margin-bottom: 18px;">
      <div class="page-title">
        <span class="material-symbols-rounded page-title-icon">shield</span>
        <div>
          <h3 style="margin: 0; font-size: 15px;">Roles Management</h3>
          <p style="margin: 2px 0 0; font-size: 12px; color: #6b7280;">Create and manage system roles</p>
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Role Name</label>
        <input
          type="text"
          placeholder="e.g. ADMIN"
          [(ngModel)]="roleName"
        />
      </div>

      <div class="form-group">
        <label>Description</label>
        <input
          type="text"
          placeholder="Short description"
          [(ngModel)]="description"
        />
      </div>
    </div>

    <button
      class="btn primary"
      (click)="createRole()"
      [disabled]="loading"
    >
      <span class="material-symbols-rounded btn-icon">add_circle</span>
      {{ loading ? 'Creating…' : 'Create Role' }}
    </button>

    <p class="error" *ngIf="error">{{ error }}</p>

  </div>

</ng-container>

<!-- =========================
     EXISTING ROLES
========================= -->

<div class="card" style="margin-top: 16px;">

  <div class="card-header flex-between" style="margin-bottom: 14px;">
    <div class="page-title">
      <span class="material-symbols-rounded page-title-icon">manage_accounts</span>
      <h3 style="margin: 0; font-size: 15px;">Existing Roles</h3>
    </div>
    <span class="badge green">{{ roles.length }} Total</span>
  </div>

  <table class="table table--compact">

    <thead>
      <tr>
        <th style="width: 20%">Role</th>
        <th>Description</th>
        <th style="width: 15%">Users</th>
        <th style="width: 150px">Actions</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let r of roles">

        <!-- ROLE -->
        <td>
          <strong>{{ r.role_name }}</strong>
        </td>

        <!-- DESCRIPTION -->
        <td>

          <!-- view -->
          <span *ngIf="editingRole?.role_id !== r.role_id">
            {{ r.description || '—' }}
          </span>

          <!-- edit (permission gated) -->
          <ng-container *ngIf="editingRole?.role_id === r.role_id">
            <input
              class="inline-edit-input"
              *hasPermission="'role.update'"
              [(ngModel)]="editDescription"
            />
          </ng-container>

        </td>

        <!-- USER COUNT -->
        <td>
          <span class="badge gray">{{ r.user_count }}</span>
        </td>

        <!-- ACTIONS -->
        <td>

          <!-- VIEW MODE -->
          <ng-container *ngIf="editingRole?.role_id !== r.role_id">
            <div class="btn-group">
              <button
                class="btn icon-btn"
                (click)="startEdit(r)"
                *hasPermission="'role.update'"
                title="Edit role"
              >
                <span class="material-symbols-rounded">edit</span>
              </button>

              <button
                class="btn icon-btn danger"
                (click)="deleteRole(r)"
                *hasPermission="'role.delete'"
                title="Delete role"
              >
                <span class="material-symbols-rounded">delete</span>
              </button>
            </div>
          </ng-container>

          <!-- EDIT MODE -->
          <ng-container *ngIf="editingRole?.role_id === r.role_id">
            <div class="btn-group">
              <button
                class="btn small primary"
                (click)="saveEdit()"
                *hasPermission="'role.update'"
              >
                <span class="material-symbols-rounded btn-icon">check</span>
                Save
              </button>

              <button
                class="btn small ghost"
                (click)="cancelEdit()"
              >
                <span class="material-symbols-rounded btn-icon">close</span>
                Cancel
              </button>
            </div>
          </ng-container>

        </td>

      </tr>

      <tr *ngIf="roles.length === 0">
        <td colspan="4" style="text-align:center; color: var(--text-secondary)">
          No roles created yet
        </td>
      </tr>

    </tbody>

  </table>

</div>
