<div class="card">
  <div class="card-header">
    <h3>Security Audit</h3>
  </div>

  <table class="table table--compact">
    <thead>
      <tr>
        <th>Date</th>
        <th>Action</th>
        <th>Entity</th>
        <th>Description</th>
        <th>By</th>
        <th>Role</th>
        <th>IP</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let a of audits">
        <td>{{ a.created_at | date:'short' }}</td>
        <td>{{ a.action }}</td>
        <td>{{ a.entity_type }}</td>
        <td>{{ a.description }}</td>
        <td>{{ a.performed_by }}</td>
        <td>{{ a.performed_role }}</td>
        <td>{{ a.ip_address }}</td>
      </tr>

      <tr *ngIf="!audits.length">
        <td colspan="7" class="text-center muted">
          No security audit records
        </td>
      </tr>
    </tbody>
  </table>

  <div class="pagination">
    <button class="btn" (click)="prevPage()" [disabled]="offset === 0">
      Previous
    </button>
    <button class="btn" (click)="nextPage()" [disabled]="audits.length < limit">
      Next
    </button>
  </div>
</div>
