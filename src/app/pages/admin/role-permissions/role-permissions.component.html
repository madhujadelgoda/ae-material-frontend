<div class="card">

  <div class="card-header">
    <h3>Assign Permissions to Role</h3>
  </div>

  <!-- ======================
       ROLE SELECTOR
  ====================== -->
  <div class="form-group">
    <label>Select Role</label>
    <select
      class="input"
      (change)="onRoleSelect($any($event.target).value)"
    >
      <option value="">Select Role</option>
      <option *ngFor="let r of roles" [value]="r.role_id">
        {{ r.role_name }}
      </option>
    </select>
  </div>

  <!-- ======================
       PERMISSIONS
  ====================== -->
  <div *ngIf="selectedRoleId">

    <!-- SEARCH -->
    <div class="form-group">
      <input
        type="text"
        class="input"
        placeholder="Search permissions…"
        [(ngModel)]="search"
      />
    </div>

    <!-- LIST -->
    <div class="permission-container">

      <div
        class="permission-group"
        *ngFor="let group of groupedPermissions"
      >
        <div class="permission-group-header">
          <strong>{{ group[0] | uppercase }}</strong>

          <div class="group-actions">
            <button class="btn small ghost"
              (click)="selectAll(group[1])">
              Select All
            </button>

            <button class="btn small ghost"
              (click)="clearAll(group[1])">
              Clear
            </button>
          </div>
        </div>

        <label
          class="permission-item"
          *ngFor="let p of group[1]"
        >
          <input
            type="checkbox"
            [checked]="selectedPermissionIds.includes(p.permission_id)"
            (change)="togglePermission(p.permission_id)"
          />
          <span>{{ p.permission_key }}</span>
        </label>
      </div>

    </div>

    <button class="btn primary" (click)="save()">
      Save Changes
    </button>

  </div>
</div>
