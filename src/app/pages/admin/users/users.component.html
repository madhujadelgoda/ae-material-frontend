<div class="card">

  <!-- =========================
       HEADER
  ========================== -->
  <div class="card-header flex-between">
    <h3>Users</h3>

    <!-- Create User -->
    <button
      class="btn primary"
      (click)="openCreate()"
      *hasPermission="'user.create'"
    >
      + New User
    </button>
  </div>

  <!-- =========================
       USERS TABLE
  ========================== -->

  <table class="table">

    <thead>
      <tr>
        <th>Username</th>
        <th>Full Name</th>
        <th>Roles</th>
        <th>Status</th>
        <th width="260">Actions</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let u of users">

        <!-- Username -->
        <td>{{ u.username }}</td>

        <!-- Full Name -->
        <td>{{ u.full_name || '—' }}</td>

        <!-- Roles -->
        <td>
          <ng-container *ngIf="u.roles?.length; else noRoles">
            <span
              class="badge"
              *ngFor="let r of u.roles"
            >
              {{ r }}
            </span>
          </ng-container>

          <ng-template #noRoles>
            <span class="muted">—</span>
          </ng-template>
        </td>

        <!-- Status -->
        <td>
          <span
            class="badge"
            [class.green]="u.status === 'ACTIVE'"
            [class.red]="u.status === 'INACTIVE'"
          >
            {{ u.status }}
          </span>
        </td>

        <!-- =========================
             ACTIONS
        ========================== -->

        <td>

          <!-- Edit -->
          <button
            class="btn small"
            (click)="openEdit(u)"
            *hasPermission="'user.update'"
          >
            Edit
          </button>

          <!-- Reset Password (NO permission gate) -->
          <button
            class="btn small"
            (click)="openReset(u)"
          >
            Reset
          </button>

          <!-- Enable / Disable (NO permission gate) -->
          <button
            class="btn warn small"
            (click)="toggleStatus(u)"
          >
            {{ u.status === 'ACTIVE' ? 'Disable' : 'Enable' }}
          </button>

          <!-- Delete -->
          <button
            class="btn danger small"
            (click)="deleteUser(u)"
            *hasPermission="'user.delete'"
          >
            Delete
          </button>

        </td>

      </tr>

    </tbody>

  </table>

</div>

<!-- =========================
     CREATE / EDIT MODAL
========================== -->

<app-user-form-modal
  *ngIf="showForm"
  [user]="selectedUser"
  (close)="showForm = false"
  (saved)="onSaved()"
></app-user-form-modal>

<!-- =========================
     RESET PASSWORD MODAL
========================== -->

<app-reset-password-modal
  *ngIf="showReset"
  [user]="selectedUser"
  (close)="showReset = false"
  (done)="onResetDone()"
></app-reset-password-modal>
