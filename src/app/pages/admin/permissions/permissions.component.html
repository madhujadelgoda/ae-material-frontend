<!-- =========================
     CREATE PERMISSION
========================= -->

<ng-container *hasPermission="'permission.create'">

  <div class="card">

    <div class="card-header">
      <h3>Create Permission</h3>
    </div>

    <div class="form-group">
      <label>Permission Key</label>
      <input
        type="text"
        placeholder="e.g. material.allocate"
        [(ngModel)]="key"
      />
    </div>

    <div class="form-group">
      <label>Description</label>
      <input
        type="text"
        placeholder="Short description"
        [(ngModel)]="desc"
      />
    </div>

    <button class="btn primary" (click)="create()">
      Create Permission
    </button>

  </div>

</ng-container>

<!-- =========================
     PERMISSIONS TABLE
========================= -->

<div class="card" style="margin-top: 20px">

  <div class="card-header flex-between">
    <h3>Permissions</h3>

    <div class="actions">
      <span class="badge green">
        {{ permissions.length }} Total
      </span>
    </div>
  </div>

  <table class="table table--compact">

    <thead>
      <tr>
        <th style="width: 30%">Permission Key</th>
        <th>Description</th>
        <th style="width: 200px">Actions</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let p of permissions">

        <!-- KEY -->
        <td>
          <code>{{ p.permission_key }}</code>
        </td>

        <!-- DESCRIPTION -->
        <td>

          <!-- view -->
          <span *ngIf="editing?.permission_id !== p.permission_id">
            {{ p.description || '—' }}
          </span>

          <!-- edit -->
          <ng-container *ngIf="editing?.permission_id === p.permission_id">
            <input
              *hasPermission="'permission.update'"
              type="text"
              [(ngModel)]="desc"
            />
          </ng-container>

        </td>

        <!-- =========================
             ACTIONS
        ========================== -->

        <td>

          <!-- VIEW MODE -->
          <ng-container *ngIf="editing?.permission_id !== p.permission_id">

            <button
              class="btn small"
              (click)="startEdit(p)"
              *hasPermission="'permission.update'"
            >
              Edit
            </button>

            <button
              class="btn danger small"
              (click)="delete(p)"
              *hasPermission="'permission.delete'"
            >
              Delete
            </button>

          </ng-container>

          <!-- EDIT MODE -->
          <ng-container *ngIf="editing?.permission_id === p.permission_id">

            <button
              class="btn small primary"
              (click)="saveEdit()"
              *hasPermission="'permission.update'"
            >
              Save
            </button>

            <button
              class="btn small ghost"
              (click)="cancelEdit()"
            >
              Cancel
            </button>

          </ng-container>

        </td>

      </tr>

      <tr *ngIf="permissions.length === 0">
        <td colspan="3" style="text-align:center; color: var(--text-secondary)">
          No permissions found
        </td>
      </tr>

    </tbody>

  </table>

</div>
