<div class="card">

  <!-- Header -->
  <div class="card-header flex-between">
    <h3>Bulk Material Allocation</h3>

    <span class="badge green" *ngIf="locator">
      {{ locator.locator_name }} ({{ locator.locator_id }})
    </span>
  </div>

  <!-- Team selection -->
  <div class="form-group">
    <label>Select Team</label>
    <select [(ngModel)]="selectedTeamId">
      <option [ngValue]="null">Select team</option>
      <option *ngFor="let t of teams" [value]="t.team_id">
        {{ t.team_name }}
      </option>
    </select>
  </div>

  <!-- Materials table -->
  <table class="table table--compact">
    <thead>
      <tr class ="table-header">
        <th style="width: 45%">Material</th>
        <th style="width: 20%">Available</th>
        <th style="width: 20%">Quantity</th>
        <th style="width: 15%"></th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let row of rows; let i = index">
        <td>
          <select [(ngModel)]="row.material_code">
            <option value="">Select material</option>

            <option
              *ngFor="let m of materials"
              [value]="m.material_code"
              [disabled]="isMaterialDisabled(m.material_code, i) || m.remaining_quantity === 0"
            >
              {{ m.material_name }}
              ({{ remainingForRow(m.material_code, i) }} {{ m.uom }})
            </option>
          </select>
        </td>

        <td>
          <span class="badge green">
            {{ remainingForRow(row.material_code, i) }}
          </span>
        </td>

        <td>
          <input
            class="qty-input"
            type="number"
            min="1"
            [max]="remainingForRow(row.material_code, i)"
            [(ngModel)]="row.quantity"
          />
        </td>

        <td>
          <button
            class="btn small warn"
            *ngIf="rows.length > 1"
            (click)="removeRow(i)"
          >
            Remove
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Actions -->
  <div class="flex-between" style="margin-top: 16px">
    <button class="btn ghost small" (click)="addRow()">
      + Add Row
    </button>

    <button
      class="btn primary"
      (click)="submit()"
      [disabled]="loading"
    >
      {{ loading ? 'Allocating…' : 'Allocate Materials' }}
    </button>
  </div>

  <!-- Feedback -->
  <p class="success" *ngIf="success">{{ success }}</p>
  <p class="error" *ngIf="error">{{ error }}</p>

</div>
