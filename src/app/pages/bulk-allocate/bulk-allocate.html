<div class="card">

  <!-- Header -->
  <div class="card-header flex-between">
    <h3>Bulk Material Allocation</h3>

    <span class="badge green" *ngIf="locator">
      {{ locator.locator_code }}
    </span>
  </div>

  <!-- Team -->
  <div class="form-group wide"
       *hasPermission="'material.allocate.bulk'">

    <label>Team</label>

    <ng-select
      [items]="teams"
      bindLabel="team_name"
      bindValue="team_id"
      placeholder="Search team..."
      [(ngModel)]="selectedTeamId"
      [clearable]="true">
    </ng-select>
  </div>

  <!-- Materials -->
  <table
    class="table table--compact"
    *hasPermission="'material.allocate.bulk'">

    <thead>
      <tr>
        <th style="width: 45%">Material</th>
        <th style="width: 20%">Available</th>
        <th style="width: 20%">Quantity</th>
        <th style="width: 15%"></th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let row of rows; let i = index; trackBy: trackByRowIndex">

        <!-- Material -->
        <td>
          <ng-select
            [items]="materials"
            bindLabel="material_name"
            bindValue="erp_code"
            placeholder="Search material..."
            [(ngModel)]="row.material_code"
            [clearable]="true">
            <ng-template ng-option-tmp let-item="item">
              {{ item.material_name }}
              — {{ getMaterialRemainingLabel(item.erp_code, i) }}
              {{ item.erp_uom }}
            </ng-template>
          </ng-select>
        </td>

        <!-- Available -->
        <td>
          <span class="badge green">
            {{ getMaterialRemainingLabel(row.material_code, i) }}
          </span>
        </td>

        <!-- Quantity -->
        <td>
          <input
            class="qty-input"
            type="number"
            min="1"
            [max]="getMaterialRemaining(row.material_code, i)"
            [(ngModel)]="row.quantity"
            [disabled]="!row.material_code"
          />
        </td>

        <!-- Remove -->
        <td>
          <button
            class="btn small warn"
            *ngIf="rows.length > 1"
            (click)="removeRow(i)">
            Remove
          </button>
        </td>

      </tr>

    </tbody>
  </table>

  <!-- Actions -->
  <div class="flex-between"
       style="margin-top: 16px"
       *hasPermission="'material.allocate.bulk'">

    <button class="btn ghost small"
            (click)="addRow()">
      + Add Row
    </button>

    <button
      class="btn primary"
      (click)="submit()"
      [disabled]="loading || !selectedTeamId">

      {{ loading ? 'Allocating…' : 'Allocate Materials' }}

    </button>

  </div>

  <!-- Feedback -->
  <p class="success" *ngIf="success">{{ success }}</p>
  <p class="error" *ngIf="error">{{ error }}</p>

</div>
