<div
  class="app-layout"
  [class.sidebar-collapsed]="sidebarCollapsed && !isMobileViewport"
  [class.mobile-sidebar-open]="mobileSidebarOpen && isMobileViewport"
>

  <div
    class="layout-backdrop"
    *ngIf="isMobileViewport && mobileSidebarOpen"
    (click)="closeMobileSidebar()"
  ></div>

  <app-sidebar
    [collapsed]="sidebarCollapsed && !isMobileViewport"
    [isMobileViewport]="isMobileViewport"
    [mobileOpen]="mobileSidebarOpen"
    (navigate)="closeMobileSidebar()"
  ></app-sidebar>

  <div class="main-wrapper">

    <header class="topbar">
      <div class="topbar-leading">
        <button
          type="button"
          class="sidebar-toggle-btn"
          (click)="toggleSidebar()"
          aria-label="Toggle sidebar"
          title="Toggle sidebar"
        >
          <span class="material-symbols-rounded">
            {{ isMobileViewport ? (mobileSidebarOpen ? 'close' : 'menu') : 'menu_open' }}
          </span>
        </button>

        <app-breadcrumb></app-breadcrumb>
      </div>

      <div class="topbar-trailing" *ngIf="showLocatorTabs">
        <div class="topbar-route-tabs">
          <a
            routerLink="/locator"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="topbar-tab-link"
          >
            My Locator
          </a>

          <a
            routerLink="/locator/team-allocations"
            routerLinkActive="active"
            class="topbar-tab-link"
            *hasPermission="'material.view_team_allocations'"
          >
            Team Allocations
          </a>
        </div>
      </div>

      <div class="topbar-trailing" *ngIf="showAuditTabs">
        <div class="topbar-route-tabs">
          <a
            routerLink="/admin/audit/operations"
            routerLinkActive="active"
            class="topbar-tab-link"
          >
            Operations
          </a>

          <a
            routerLink="/admin/audit/security"
            routerLinkActive="active"
            class="topbar-tab-link"
          >
            Security
          </a>
        </div>
      </div>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
