<nav class="sidebar">

  <!-- Brand -->
  <div class="sidebar-header">
    <span class="brand-dot"></span>
    <span class="brand-title">AE Material</span>
  </div>

  <!-- MAIN -->
  <div class="sidebar-section">
    <p class="sidebar-section-title">MAIN</p>

    <a
      routerLink="/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar-link"
    >
      Dashboard
    </a>

    <a
      routerLink="/locator"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar-link"
    >
      My Locator
    </a>

    <!-- <a routerLink="/materials" routerLinkActive="active" class="sidebar-link">
      Materials
    </a>

    <a routerLink="/teams" routerLinkActive="active" class="sidebar-link">
      Teams
    </a> -->

    <a
      routerLink="/assign"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar-link"
    >
      Assign Materials
    </a>

    <a
      routerLink="/return"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar-link"
    >
      Return Materials
    </a>

    <a
      routerLink="/bulk-allocate"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar-link"
    >
      Bulk Allocation
    </a>
  </div>

  <!-- ADMIN SECTION -->
  <div class="sidebar-section" *ngIf="isAdmin">
    <p class="sidebar-section-title">ADMIN</p>

    <a
      routerLink="/admin/users"
      routerLinkActive="active"
      class="sidebar-link"
    >
      Users
    </a>

    <a
      routerLink="/admin/roles"
      routerLinkActive="active"
      class="sidebar-link"
    >
      Roles
    </a>

    <a
      routerLink="/admin/permissions"
      routerLinkActive="active"
      class="sidebar-link"
    >
      Permissions
    </a>
  </div>

  <!-- FOOTER -->
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="avatar">
        {{ username.charAt(0) | uppercase }}
      </div>

      <div>
        <div class="user-name">{{ username }}</div>
        <button class="logout-btn" (click)="logout()">Logout</button>
      </div>
    </div>
  </div>

</nav>
