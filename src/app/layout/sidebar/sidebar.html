<nav class="sidebar">

  <!-- BRAND -->
  <div class="sidebar-header">
    <span class="brand-dot"></span>
    <span class="brand-title">AE Material</span>
  </div>

  <!-- NAV (scrollable) -->
  <div class="sidebar-nav">

  <!-- MAIN -->
  <div class="sidebar-section">
    <p class="sidebar-section-title">MAIN</p>

    <a
      routerLink="/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar-link"
    >
      Dashboard
    </a>

    <a
      *hasPermission="'admin.locator.view'"
      routerLink="/admin/locators"
      routerLinkActive="active"
      class="sidebar-link"
    >
      Locator Overview
    </a>

    <a
      *hasPermission="'erp.locator.view'"
      routerLink="/locator"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar-link"
    >
      My Locator
    </a>

    <a
      *hasPermission="'material.allocate'"
      routerLink="/assign"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar-link"
    >
      Assign Materials
    </a>

    <a
      *hasPermission="'material.return'"
      routerLink="/return"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar-link"
    >
      Return Materials
    </a>

    <a
      *hasPermission="'material.allocate.bulk'"
      routerLink="/bulk-allocate"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar-link"
    >
      Bulk Allocation
    </a>
  </div>

  <!-- ADMIN -->
  <div class="sidebar-section" *ngIf="isAdmin()">
    <p class="sidebar-section-title">ADMIN</p>

    <a
      *hasPermission="'user.view'"
      routerLink="/admin/users"
      routerLinkActive="active"
      class="sidebar-link"
    >
      Users
    </a>

    <a
      *hasPermission="'role.view'"
      routerLink="/admin/roles"
      routerLinkActive="active"
      class="sidebar-link"
    >
      Roles
    </a>

    <a
      *hasPermission="'permission.view'"
      routerLink="/admin/permissions"
      routerLinkActive="active"
      class="sidebar-link"
    >
      Permissions
    </a>

    <a
      *hasPermission="'role.permission.assign'"
      routerLink="/admin/role-permissions"
      routerLinkActive="active"
      class="sidebar-link"
    >
      Role Permissions
    </a>
  </div>

  <!-- AUDIT -->
  <div class="sidebar-section" *ngIf="isAdmin()">
    <p class="sidebar-section-title">AUDIT</p>

    <a
      *hasPermission="'audit.operations.view'"
      routerLink="/admin/audit"
      routerLinkActive="active"
      class="sidebar-link"
    >
      Audit Logs
    </a>
  </div>

  </div><!-- /sidebar-nav -->

  <!-- FOOTER -->
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="avatar">
        {{ username.charAt(0) | uppercase }}
      </div>

      <div>
        <div class="user-name">{{ username }}</div>
        <button
          class="logout-btn"
          (click)="confirmLogout()"
        >
          Logout
        </button>
      </div>
    </div>
  </div>

</nav>
